<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON ZELOA PARIS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-sub: #555555;
            --accent: #8b7355;
        }

        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; color: var(--text-main); background-color: var(--bg-color); line-height: 1.6; scroll-behavior: smooth; }
        header { position: fixed; width: 100%; top: 0; padding: 20px 50px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background-color: rgba(255, 255, 255, 0.95); z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; text-decoration: none; color: #000; display: flex; align-items: center; }
        .logo-z { font-style: italic; font-size: 2.2rem; margin-right: 15px; }
        .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
        .logo-maison { font-size: 0.5rem; letter-spacing: 4px; font-weight: normal; margin-bottom: 2px; }
        .logo-main { font-size: 1.2rem; letter-spacing: 3px; font-weight: bold; text-transform: lowercase; }
        .logo-paris { font-size: 0.5rem; letter-spacing: 4px; font-weight: normal; margin-top: 2px; }
        nav a { margin-left: 30px; text-decoration: none; color: #333; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
        .lang-toggle { margin-left: 40px; padding: 5px 12px; border: 1px solid #111; background: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; }

        .hero { height: 100vh; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 100px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 50%), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover; color: #fff; text-align: center; }
        .hero-content h2 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 15px; text-transform: uppercase; }

        section.content-section { padding: 120px 20px; max-width: 900px; margin: auto; text-align: center; }
        h3 { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 2px; margin-bottom: 40px; text-transform: uppercase; border-bottom: 1px solid #111; display: inline-block; padding-bottom: 10px; }
        .origin-card { background-color: #fcfaf7; padding: 60px 40px; margin-bottom: 60px; border-radius: 2px; text-align: center; }
        .origin-title { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); font-size: 1.5rem; margin-bottom: 20px; }
        .about-text { line-height: 2.2; color: var(--text-sub); font-size: 1.1rem; word-break: keep-all; text-align: justify; }

        .collection-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 25px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 0.85rem; letter-spacing: 1px; font-family: 'Playfair Display', serif; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { background: #111; color: #fff; border-color: #111; }

        .gallery-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease forwards; }
        .gallery-item { text-align: left; overflow: hidden; }
        .gallery-item img { width: 100%; height: 600px; object-fit: cover; transition: 0.6s ease; background-color: #f0f0f0; } /* 로딩 전 배경색 추가 */
        .gallery-item:hover img { transform: scale(1.03); }
        .gallery-item h4 { font-family: 'Playfair Display', serif; margin: 15px 0 5px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .gallery-item p { color: #888; font-size: 0.9rem; margin: 0; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        footer { background-color: #111; color: #fff; text-align: center; padding: 60px 20px; font-size: 0.8em; letter-spacing: 1px; }
        .lang-ko { display: none; }
    </style>
</head>
<body>

                <span class="logo-maison">MAISON</span>
                <span class="logo-main">zeloa</span>
                <span class="logo-paris">PARIS</span>
            </div>
        </a>
