<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON ZELOA PARIS&SEOUL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400&display=swap');

        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-sub: #555555;
            --accent: #8b7355;
        }

        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; color: var(--text-main); background-color: var(--bg-color); line-height: 1.6; scroll-behavior: smooth; }
        
        header { position: fixed; width: 100%; top: 0; padding: 25px 50px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background-color: rgba(255, 255, 255, 0.98); z-index: 1000; border-bottom: 1px solid #f2f2f2; }
        .logo { font-family: 'Playfair Display', serif; text-decoration: none; color: #000; display: flex; align-items: center; }
        .logo-z { font-style: italic; font-size: 2.2rem; margin-right: 15px; }
        .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
        .logo-maison { font-size: 0.5rem; letter-spacing: 4px; font-weight: normal; margin-bottom: 2px; }
        .logo-main { font-size: 1.2rem; letter-spacing: 3px; font-weight: bold; text-transform: lowercase; }
        .logo-paris { font-size: 0.5rem; letter-spacing: 4px; font-weight: normal; margin-top: 2px; }
        
        nav a { margin-left: 35px; text-decoration: none; color: #333; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--accent); }
        .lang-toggle { margin-left: 45px; padding: 6px 14px; border: 1px solid #111; background: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; }

        .hero { height: 100vh; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 120px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 50%), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover; color: #fff; text-align: center; }
        .hero-content h2 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; }

        section.content-section { padding: 140px 20px; max-width: 1000px; margin: auto; text-align: center; }
        h3 { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 50px; text-transform: uppercase; border-bottom: 1px solid #111; display: inline-block; padding-bottom: 10px; }
        
        .maison-story { display: flex; flex-direction: column; gap: 80px; margin-bottom: 100px; }
        .story-block { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; text-align: justify; }
        .story-block.reverse { direction: rtl; }
        .story-block.reverse .story-text { direction: ltr; }
        .story-image { width: 100%; height: 450px; object-fit: cover; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background-color: #f7f7f7; }
        
        .origin-card { background-color: #fcfaf7; padding: 70px 50px; margin-bottom: 80px; border-radius: 2px; text-align: center; border: 1px solid #f0efeb; }
        .origin-title { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); font-size: 1.6rem; margin-bottom: 25px; }
        .about-text { line-height: 2.2; color: var(--text-sub); font-size: 1.1rem; word-break: keep-all; }

        .collection-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 60px; flex-wrap: wrap; }
        .tab-btn { padding: 14px 28px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 0.85rem; letter-spacing: 1.5px; font-family: 'Playfair Display', serif; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active, .tab-btn:hover { background: #111; color: #fff; border-color: #111; }

        .gallery-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease forwards; }
        .gallery-item { text-align: left; overflow: hidden; }
        .gallery-item img { width: 100%; height: 600px; object-fit: cover; transition: 0.8s ease; background-color: #f8f8f8; }
        .gallery-item:hover img { transform: scale(1.03); }
        .gallery-item h4 { font-family: 'Playfair Display', serif; margin: 20px 0 8px; font-size: 1.4rem; border-bottom: 1px solid #eee; padding-bottom: 10px; font-weight: 400; }
        .gallery-item p { color: #888; font-size: 0.9rem; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        footer { background-color: #111; color: #fff; text-align: center; padding: 80px 20px; font-size: 0.8em; letter-spacing: 2px; }
        .lang-ko { display: none; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <span class="logo-z">Z</span>
            <div class="logo-text">
                <span class="logo-maison">MAISON</span>
                <span class="logo-main">ZELOA</span>
                <span class="logo-paris">PARIS@SEOUL</span>
            </div>
        </a>
        <nav>
            <a href="#"><span class="lang-ko">메인</span><span class="lang-en">Home</span></a>
            <a href="#about"><span class="lang-ko">브랜드 스토리</span><span class="lang-en">Brand Story</span></a>
            <a href="#collections"><span class="lang-ko">컬렉션</span><span class="lang-en">Collections</span></a>
            <button class="lang-toggle" onclick="toggleLanguage()">KR</button>
        </nav>
    </header>

    <section id="main" class="hero">
        <div class="hero-content">
            <h2 class="lang-ko">시간을 초월한 우아함</h2>
            <h2 class="lang-en">TIMELESS ELEGANCE</h2>
        </div>
    </section>
</html>
